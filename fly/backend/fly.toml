# =============================================================================
# fly/backend/fly.toml — Linkyard backend on Fly.io
# =============================================================================
# Deploy from repo root:
#   fly deploy --config fly/backend/fly.toml --dockerfile backend/Dockerfile
#
# Secrets (set via `fly secrets set`, never committed):
#   ADMIN_TOKEN          openssl rand -hex 32
#   DATABASE_URL         postgresql+asyncpg://... (from `fly postgres attach`)
#   DATABASE_URL_SYNC    postgresql://...         (same host, psycopg driver)
#
# Non-secret config lives in [env] below.
# =============================================================================

app = "linkyard-backend"
primary_region = "iad"

[build]
  # Build context must be repo root so COPY ../scripts/... resolves.
  # Pass --dockerfile backend/Dockerfile on the fly deploy command line.
  dockerfile = "backend/Dockerfile"

[env]
  EMBEDDING_PROVIDER  = "local"
  EMBEDDING_DIM       = "384"
  DEMO_SEED           = "true"
  # Override at deploy time once the frontend URL is known. Combined regex
  # accepts the hosted frontend AND any load-unpacked extension install
  # (load-unpacked IDs are per-user-per-path, so we wildcard rather than pin):
  #   fly secrets set CORS_ORIGIN_REGEX="https://linkyard-frontend\.fly\.dev|chrome-extension://[a-p]{32}"
  # See docs/DEPLOY.md step 10.
  CORS_ORIGIN_REGEX   = "__PLACEHOLDER__"
  # EGRESS_FIREWALL=false because Fly Machines do not grant CAP_NET_ADMIN.
  # Application-level SSRF guards (IP blocklist + redirect hook) remain active.
  # See docs/DEPLOY.md §CAP_NET_ADMIN note for rationale.
  EGRESS_FIREWALL     = "false"

[http_service]
  internal_port        = 8000
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period  = "10s"
    interval      = "15s"
    method        = "GET"
    path          = "/healthz"
    protocol      = "http"
    timeout       = "5s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
