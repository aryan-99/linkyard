# =============================================================================
# fly/frontend/fly.toml — Linkyard frontend on Fly.io
# =============================================================================
# Deploy from repo root:
#   fly deploy --config fly/frontend/fly.toml \
#     --dockerfile fly/frontend/Dockerfile \
#     --build-arg VITE_API_BASE_URL=https://linkyard-backend.fly.dev
#
# No runtime secrets needed — VITE_API_BASE_URL is baked into the bundle.
# =============================================================================

app = "linkyard-frontend"
primary_region = "iad"

[build]
  dockerfile = "fly/frontend/Dockerfile"

[http_service]
  internal_port        = 80
  force_https          = true
  auto_stop_machines   = "stop"
  auto_start_machines  = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period  = "5s"
    interval      = "15s"
    method        = "GET"
    path          = "/healthz"
    protocol      = "http"
    timeout       = "5s"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"
