services:
  db:
    image: pgvector/pgvector:pg16
    container_name: linkyard-db
    environment:
      POSTGRES_USER: linkyard
      POSTGRES_PASSWORD: linkyard
      POSTGRES_DB: linkyard
    ports:
      - "5432:5432"
    volumes:
      - linkyard-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkyard -d linkyard"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  linkyard-db-data:
