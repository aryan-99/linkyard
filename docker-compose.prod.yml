services:
  db:
    image: pgvector/pgvector:pg16
    container_name: linkyard-db-prod
    environment:
      POSTGRES_USER: linkyard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: linkyard
    volumes:
      - linkyard-prod-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkyard -d linkyard"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: linkyard-backend-prod
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    cap_add:
      - NET_ADMIN
    environment:
      # asyncpg URL used by SQLAlchemy async engine at runtime
      DATABASE_URL: postgresql+asyncpg://linkyard:${POSTGRES_PASSWORD}@db:5432/linkyard

      # psycopg2 URL used by Alembic for synchronous migrations
      DATABASE_URL_SYNC: postgresql://linkyard:${POSTGRES_PASSWORD}@db:5432/linkyard

      # REQUIRED: set ADMIN_TOKEN in your shell or a .env file before running.
      # Generate with: openssl rand -hex 32
      # docker compose will refuse to start if this variable is unset or empty.
      ADMIN_TOKEN: ${ADMIN_TOKEN:?ADMIN_TOKEN must be set (run: export ADMIN_TOKEN=$(openssl rand -hex 32))}

      # Pin to your extension's ID before go-live — find it on chrome://extensions after loading unpacked.
      # Example: chrome-extension://abcdefghijklmnopabcdefghijklmnop
      CORS_ORIGIN_REGEX: "chrome-extension://[a-p]{32}"

      EMBEDDING_PROVIDER: local
      EMBEDDING_DIM: 384

      # When true, pre-loads ~40 example links on first boot if the DB is empty.
      # Idempotent (no-op once links exist). Default unset → false. Safe to leave on.
      DEMO_SEED: ${DEMO_SEED:-false}
    restart: unless-stopped

volumes:
  linkyard-prod-db-data:
