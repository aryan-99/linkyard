<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Linkyard Settings</title>
    <style>
      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Light-mode tokens ── */
      :root {
        --bg:            #ffffff;
        --surface:       #f5f5f5;
        --border:        #e2e2e2;
        --text-primary:  #1a1a1a;
        --text-secondary:#555555;
        --text-muted:    #888888;
        --accent:        #2563eb;
        --accent-tint:   rgba(37, 99, 235, 0.08);
        --error:         #dc2626;
        --success:       #16a34a;
      }

      /* ── Dark-mode tokens ── */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg:            #0f0f0f;
          --surface:       #1a1a1a;
          --border:        #2a2a2a;
          --text-primary:  #f0f0f0;
          --text-secondary:#aaaaaa;
          --text-muted:    #666666;
          --accent:        #3b82f6;
          --accent-tint:   rgba(59, 130, 246, 0.12);
          --error:         #f87171;
          --success:       #4ade80;
        }
      }

      /* ── Base ── */
      body {
        background: var(--bg);
        color: var(--text-primary);
        font: 13px/1.5 system-ui, -apple-system, sans-serif;
        min-width: 360px;
        max-width: 520px;
        margin: 32px auto;
        padding: 0 16px;
      }

      /* ── Header bar ── */
      .header {
        display: flex;
        align-items: center;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        border-radius: 8px 8px 0 0;
      }

      .header__wordmark {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.01em;
      }

      .header__subtitle {
        margin-left: 8px;
        font-size: 13px;
        color: var(--text-muted);
      }

      /* ── Body ── */
      .body {
        padding: 16px 14px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        border: 1px solid var(--border);
        border-top: none;
        border-radius: 0 0 8px 8px;
        background: var(--bg);
      }

      /* ── Form group ── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }

      label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
      }

      input[type="text"] {
        height: 34px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface);
        color: var(--text-primary);
        font: 13px/1 system-ui, -apple-system, sans-serif;
        outline: none;
        transition: border-color 0.15s;
      }

      input[type="text"]:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 2px var(--accent-tint);
      }

      .field__hint {
        font-size: 11px;
        color: var(--text-muted);
      }

      /* ── Save button ── */
      #save {
        align-self: flex-start;
        height: 34px;
        padding: 0 18px;
        background: var(--accent);
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      #save:hover {
        opacity: 0.88;
      }

      /* ── Status line ── */
      #status {
        font-size: 12px;
        min-height: 1.4em;
        color: var(--text-muted);
      }

      #status.success { color: var(--success); }
      #status.error   { color: var(--error); }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="header__wordmark">Linkyard</span>
      <span class="header__subtitle">Settings</span>
    </div>
    <div class="body">
      <div class="field">
        <label for="api-base">Backend URL</label>
        <input
          type="text"
          id="api-base"
          placeholder="http://localhost:8000"
          spellcheck="false"
          autocomplete="off"
        />
        <span class="field__hint">
          Default: http://localhost:8000. Restart the extension after changing.
        </span>
      </div>
      <button id="save">Save</button>
      <div id="status"></div>
    </div>
    <script src="options.js"></script>
  </body>
</html>
