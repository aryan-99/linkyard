<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Linkyard</title>
    <style>
      /* ── Reset ── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      /* ── Light-mode tokens ── */
      :root {
        --bg:            #ffffff;
        --surface:       #f5f5f5;
        --border:        #e2e2e2;
        --text-primary:  #1a1a1a;
        --text-secondary:#555555;
        --text-muted:    #888888;
        --accent:        #2563eb;
        --accent-tint:   rgba(37, 99, 235, 0.08);
        --error:         #dc2626;
        --success:       #16a34a;
      }

      /* ── Dark-mode tokens ── */
      @media (prefers-color-scheme: dark) {
        :root {
          --bg:            #0f0f0f;
          --surface:       #1a1a1a;
          --border:        #2a2a2a;
          --text-primary:  #f0f0f0;
          --text-secondary:#aaaaaa;
          --text-muted:    #666666;
          --accent:        #3b82f6;
          --accent-tint:   rgba(59, 130, 246, 0.12);
          --error:         #f87171;
          --success:       #4ade80;
        }
      }

      /* ── Base ── */
      body {
        width: 280px;
        background: var(--bg);
        color: var(--text-primary);
        font: 13px/1.5 system-ui, -apple-system, sans-serif;
      }

      /* ── Header bar ── */
      .header {
        display: flex;
        align-items: center;
        padding: 8px 12px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
      }

      .header__wordmark {
        font-size: 16px;
        font-weight: 700;
        color: var(--text-primary);
        letter-spacing: -0.01em;
      }

      .header__spacer {
        flex: 1;
      }

      #options-btn {
        background: none;
        border: none;
        padding: 2px 4px;
        cursor: pointer;
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1;
        border-radius: 4px;
        transition: color 0.15s;
      }

      #options-btn:hover {
        color: var(--text-secondary);
      }

      /* ── Body ── */
      .body {
        padding: 12px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      /* ── Page info ── */
      #page-title {
        font-size: 12px;
        font-weight: 600;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-height: 1.4em;
      }

      #page-url {
        font-size: 11px;
        color: var(--text-muted);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-height: 1.4em;
      }

      /* ── Save button ── */
      #save {
        width: 100%;
        height: 36px;
        background: var(--accent);
        color: #ffffff;
        border: none;
        border-radius: 6px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.15s;
      }

      #save:hover:not(:disabled) {
        opacity: 0.88;
      }

      #save:disabled {
        opacity: 0.55;
        cursor: default;
      }

      /* ── Snippet textarea ── */
      #snippet {
        width: 100%;
        height: 64px;
        padding: 7px 9px;
        font: 12px/1.5 system-ui, -apple-system, sans-serif;
        color: var(--text-primary);
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        resize: vertical;
        outline: none;
        transition: border-color 0.15s;
      }

      #snippet::placeholder {
        color: var(--text-muted);
      }

      #snippet:focus {
        border-color: var(--accent);
      }

      /* ── Status line ── */
      #status {
        font-size: 12px;
        min-height: 1.4em;
        color: var(--text-muted);
      }

      #status.saving  { color: var(--text-muted); }
      #status.success { color: var(--success); }
      #status.error   { color: var(--error); }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="header__wordmark">Linkyard</span>
      <span class="header__spacer"></span>
      <button id="options-btn" title="Settings">&#9881;</button>
    </div>
    <div class="body">
      <p id="page-title"></p>
      <p id="page-url"></p>
      <textarea id="snippet" placeholder="Add a note (optional)"></textarea>
      <button id="save">Save this page</button>
      <div id="status"></div>
    </div>
    <script src="popup.js" type="module"></script>
  </body>
</html>
